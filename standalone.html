<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c96442" />
  <title>Loopapp — Todo lo que se repite, a la vista</title>
  <style>
:root {
  /* Paleta cálida tipo Claude */
  --bg: #f5f4ee;          /* marfil */
  --bg-soft: #efede4;
  --card: #ffffff;
  --card-hover: #f6f4ed;
  --border: #e4e1d6;
  --border-strong: #d8d4c6;
  --text: #29261f;        /* casi negro cálido */
  --text-dim: #76726a;
  --accent: #c96442;      /* terracota Claude */
  --accent-soft: #b8573a;
  --accent-tint: #f3e9e3;

  /* Estados (sobrios, acordes a la paleta cálida) */
  --overdue: #b3392b;
  --urgent: #c5703a;
  --upcoming: #b08a2e;
  --ok: #5d8a55;
  --done: #9a968c;
  --neutral: #5e7f9c;

  --radius: 16px;
  --radius-sm: 12px;
  --shadow: 0 1px 2px rgba(41, 38, 31, 0.04), 0 8px 24px rgba(41, 38, 31, 0.06);
  --serif: ui-serif, "Iowan Old Style", Georgia, "Times New Roman", serif;
  --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

#app { max-width: 720px; margin: 0 auto; padding: 0 18px 120px; }

/* Iconos SVG monocromáticos */
svg { display: block; }
.ico { display: inline-flex; align-items: center; justify-content: center; color: currentColor; }
.emoji-ico { font-style: normal; font-size: 19px; line-height: 1; }

/* ---------- Header ---------- */
.app-header { padding-top: 26px; position: sticky; top: 0; z-index: 20;
  background: linear-gradient(180deg, var(--bg) 72%, transparent); padding-bottom: 10px; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.brand { display: flex; align-items: center; gap: 12px; }
.brand-logo { color: var(--accent); display: inline-flex; }
.brand-logo svg { width: 26px; height: 26px; }
.brand h1 { font-family: var(--serif); font-size: 23px; font-weight: 600; letter-spacing: -0.2px; }
.tagline { font-size: 12.5px; color: var(--text-dim); margin-top: 1px; }

.icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text);
  width: 40px; height: 40px; border-radius: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; }
.icon-btn svg { width: 19px; height: 19px; }
.icon-btn:hover { background: var(--card-hover); border-color: var(--border-strong); }

/* ---------- Menú desplegable ---------- */
.menu-wrap { position: relative; }
.dropdown { position: absolute; top: calc(100% + 8px); left: 0; z-index: 40;
  min-width: 248px; background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; box-shadow: var(--shadow); padding: 6px;
  display: flex; flex-direction: column; gap: 1px; }
.dropdown[hidden] { display: none; }
.dropdown-item { display: flex; align-items: center; gap: 11px; width: 100%;
  background: transparent; border: none; color: var(--text); text-align: left;
  font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer;
  padding: 10px 11px; border-radius: 9px; text-decoration: none; }
.dropdown-item svg { width: 17px; height: 17px; color: var(--text-dim); flex: 0 0 auto; }
.dropdown-item:hover { background: var(--card-hover); }
.dropdown-item.danger { color: var(--overdue); }
.dropdown-item.danger svg { color: var(--overdue); }
.dropdown-sep { height: 1px; background: var(--border); margin: 5px 6px; }

/* ---------- Resumen ---------- */
.summary-bar { display: flex; gap: 8px; margin-top: 18px; overflow-x: auto; padding-bottom: 4px; }
.summary-pill { flex: 0 0 auto; display: flex; align-items: center; gap: 7px;
  background: var(--card); border: 1px solid var(--border); padding: 8px 13px;
  border-radius: 999px; font-size: 13px; font-weight: 600; white-space: nowrap; color: var(--text); }
.summary-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
.summary-pill.total { background: var(--accent); border-color: var(--accent); color: #fff;
  font-family: var(--serif); }
.summary-pill .sub { color: var(--text-dim); font-weight: 500; }
.summary-pill.total .sub { color: rgba(255,255,255,.8); }

/* ---------- Filtros ---------- */
.filters { display: flex; gap: 8px; margin-top: 14px; overflow-x: auto; padding-bottom: 4px; }
.filter-chip { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px;
  background: var(--card); border: 1px solid var(--border); color: var(--text-dim);
  padding: 7px 13px; border-radius: 999px; font-size: 13px; cursor: pointer; font-weight: 600; }
.filter-chip svg { width: 15px; height: 15px; }
.filter-chip:hover { color: var(--text); border-color: var(--border-strong); }
.filter-chip.active { background: var(--text); border-color: var(--text); color: var(--bg); }

/* ---------- View switch ---------- */
.view-switch { display: flex; gap: 4px; margin-top: 16px; background: var(--bg-soft);
  padding: 4px; border-radius: 13px; border: 1px solid var(--border); }
.view-switch button { flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  background: transparent; border: none; color: var(--text-dim);
  padding: 9px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
.view-switch button svg { width: 16px; height: 16px; }
.view-switch button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }

/* ---------- Buscador ---------- */
.search-input { width: 100%; margin-top: 14px; background: var(--card);
  border: 1px solid var(--border); color: var(--text); padding: 11px 14px;
  border-radius: 12px; font-size: 14px; font-family: inherit; }
.search-input:focus { outline: none; border-color: var(--accent); }
.search-input::placeholder { color: var(--text-dim); }

/* ---------- Cards grid ---------- */
main { margin-top: 14px; }
.cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (max-width: 460px) { .cards-grid { grid-template-columns: 1fr; } }

.loop-card { position: relative; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; cursor: pointer; overflow: hidden;
  transition: 0.18s; border-left: 3px solid var(--state-color, var(--border)); }
.loop-card:hover { border-color: var(--border-strong); transform: translateY(-2px); box-shadow: var(--shadow); }
.loop-card .card-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.loop-card .card-icon { color: var(--text); display: inline-flex; }
.loop-card .card-icon svg { width: 22px; height: 22px; }
.loop-card .state-badge { font-size: 11px; font-weight: 700; padding: 4px 9px 4px 7px; border-radius: 999px;
  color: #fff; background: var(--state-color); display: inline-flex; align-items: center; gap: 4px; }
.loop-card .state-badge svg { width: 12px; height: 12px; }
.loop-card .title { font-size: 15px; font-weight: 700; margin-top: 12px; line-height: 1.25; }
.loop-card .countdown { margin-top: 8px; display: flex; align-items: baseline; gap: 6px; }
.loop-card .count-num { font-family: var(--serif); font-size: 30px; font-weight: 600; letter-spacing: -0.5px; color: var(--state-color); }
.loop-card .count-num.sm { font-size: 21px; }
.loop-card .count-label { font-size: 12.5px; color: var(--text-dim); }
.loop-card .count-clock { margin-top: 4px; font-size: 12.5px; font-weight: 600; color: var(--text-dim);
  font-variant-numeric: tabular-nums; letter-spacing: 0.3px; }
.loop-card .countbar { margin-top: 9px; height: 5px; border-radius: 999px; background: var(--bg-soft);
  overflow: hidden; }
.loop-card .countbar > i { display: block; height: 100%; border-radius: 999px;
  background: var(--state-color); transition: width 0.4s ease; }
.loop-card .meta { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; }
.loop-card .amount { font-size: 14px; font-weight: 700; }
.loop-card .cycle { font-size: 11.5px; color: var(--text-dim); display: inline-flex; align-items: center; gap: 4px; }
.loop-card .cycle svg { width: 13px; height: 13px; }
.loop-card .done-btn { margin-top: 12px; width: 100%; background: var(--bg-soft); border: 1px solid var(--border);
  color: var(--text); padding: 9px; border-radius: 10px; font-weight: 700; font-size: 13px; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.loop-card .done-btn svg { width: 15px; height: 15px; }
.loop-card .done-btn:hover { background: var(--state-color); border-color: var(--state-color); color: #fff; }

/* ---------- Suscripciones ---------- */
.subs-hero { background: var(--accent); color: #fff; border-radius: var(--radius); padding: 24px; text-align: center; }
.subs-hero .big { font-family: var(--serif); font-size: 40px; font-weight: 600; letter-spacing: -1px; }
.subs-hero .label { font-size: 13px; opacity: 0.9; margin-top: 2px; }
.subs-hero .split { display: flex; justify-content: center; gap: 30px; margin-top: 18px; }
.subs-hero .split .n { display: block; font-family: var(--serif); font-size: 20px; font-weight: 600; }
.subs-hero .split .t { display: block; font-size: 11.5px; opacity: 0.85; }
.subs-list { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
.sub-row { display: flex; align-items: center; gap: 14px; background: var(--card);
  border: 1px solid var(--border); border-left: 3px solid var(--state-color, var(--border));
  border-radius: var(--radius-sm); padding: 13px 15px; cursor: pointer; }
.sub-row:hover { border-color: var(--border-strong); }
.sub-row .ic { color: var(--text); display: inline-flex; }
.sub-row .ic svg { width: 22px; height: 22px; }
.sub-row .info { flex: 1; }
.sub-row .info .n { font-weight: 700; font-size: 14.5px; }
.sub-row .info .d { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.sub-row .right { text-align: right; }
.sub-row .right .a { font-weight: 800; font-size: 15px; }
.sub-row .right .c { font-size: 11px; font-weight: 700; color: var(--state-color); display: inline-flex; align-items: center; gap: 3px; justify-content: flex-end; }
.sub-row .right .c svg { width: 12px; height: 12px; }

/* ---------- Calendario ---------- */
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-head h3 { font-family: var(--serif); font-size: 18px; font-weight: 600; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.cal-dow { text-align: center; font-size: 11px; color: var(--text-dim); font-weight: 700; padding: 4px 0; }
.cal-cell { aspect-ratio: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 5px; font-size: 12px; display: flex; flex-direction: column; gap: 3px; }
.cal-cell.empty { background: transparent; border: none; }
.cal-cell.today { border-color: var(--accent); }
.cal-cell .day-num { color: var(--text-dim); font-weight: 600; }
.cal-cell.today .day-num { color: var(--accent); }
.cal-dots { display: flex; flex-wrap: wrap; gap: 2px; }
.cal-dots .d { width: 7px; height: 7px; border-radius: 50%; }

/* ---------- Empty ---------- */
.empty { text-align: center; padding: 60px 20px; color: var(--text-dim); }
.empty .em { color: var(--border-strong); display: inline-flex; }
.empty .em svg { width: 48px; height: 48px; }
.empty h3 { font-family: var(--serif); color: var(--text); margin: 16px 0 6px; font-weight: 600; }

/* ---------- FAB ---------- */
.fab { position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
  width: 56px; height: 56px; border-radius: 50%; background: var(--accent);
  color: #fff; border: none; cursor: pointer; box-shadow: var(--shadow);
  z-index: 30; transition: 0.15s; display: flex; align-items: center; justify-content: center; }
.fab svg { width: 24px; height: 24px; }
.fab:hover { background: var(--accent-soft); transform: translateX(-50%) scale(1.05); }

/* ---------- Modal ---------- */
.modal-overlay { position: fixed; inset: 0; background: rgba(41, 38, 31, 0.35); backdrop-filter: blur(3px);
  display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
.modal-overlay[hidden] { display: none; }
@media (min-width: 560px) { .modal-overlay { align-items: center; } }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 22px 22px 0 0;
  width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; padding: 24px; box-shadow: var(--shadow); }
@media (min-width: 560px) { .modal { border-radius: 22px; } }
.modal h2 { font-family: var(--serif); font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.modal .modal-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }
.field { margin-bottom: 15px; }
.field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-dim);
  margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select, .field textarea { width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); padding: 12px 14px; border-radius: 11px; font-size: 15px; font-family: inherit; }
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); background: var(--card); }
.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }
.icon-picker { display: flex; flex-wrap: wrap; gap: 8px; }
.icon-picker button { width: 44px; height: 44px; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 11px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center; }
.icon-picker button svg { width: 20px; height: 20px; }
.icon-picker button.sel { border-color: var(--accent); background: var(--accent-tint); color: var(--accent); }
.cat-picker { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.cat-picker button { display: flex; align-items: center; gap: 9px; background: var(--bg);
  border: 1px solid var(--border); color: var(--text); padding: 11px; border-radius: 11px;
  cursor: pointer; font-size: 13.5px; font-weight: 600; font-family: inherit; }
.cat-picker button svg { width: 17px; height: 17px; color: var(--text-dim); }
.cat-picker button.sel { border-color: var(--accent); background: var(--accent-tint); color: var(--accent); }
.cat-picker button.sel svg { color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 24px; }
.btn { flex: 1; padding: 13px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-soft); }
.btn-ghost { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
.btn-danger { background: transparent; border: 1px solid var(--overdue); color: var(--overdue); }

/* ---------- Animaciones e interacción ---------- */
@keyframes fadeUp { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
.cards-grid .loop-card { animation: fadeUp 0.25s ease both; }
.sub-row { animation: fadeUp 0.2s ease both; }
.dropdown { animation: fadeUp 0.14s ease both; }
.icon-btn, .filter-chip, .view-switch button, .btn, .done-btn { transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease; }
.icon-btn:active, .filter-chip:active, .view-switch button:active, .btn:active, .done-btn:active { transform: scale(0.96); }
.fab:active { transform: translateX(-50%) scale(0.96); }
@media (prefers-reduced-motion: reduce) {
  .cards-grid .loop-card, .sub-row, .dropdown { animation: none; }
}

/* scrollbars */
::-webkit-scrollbar { height: 6px; width: 6px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

</style>
</head>

    <header class="app-header">
      <div class="header-top">
        <div class="brand">
          <div class="menu-wrap">
            <button class="icon-btn" id="menu-toggle" title="Menú" aria-label="Abrir menú" aria-haspopup="true" aria-expanded="false" data-ico="menu"></button>

/* ============================================================
   Utilidades de fecha y estado
   ============================================================ */
function uid() { return Math.random().toString(36).slice(2, 10); }
function todayMid() { const t = new Date(); t.setHours(0,0,0,0); return t; }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDate(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function offsetDate(days) { const t = todayMid(); t.setDate(t.getDate() + days); return fmtDate(t); }

function daysUntil(dateStr) {
  return Math.round((parseDate(dateStr) - todayMid()) / 86400000);
}

function statusOf(loop) {
  const dl = daysUntil(loop.nextDate);
  const notify = loop.notifyDaysBefore ?? 3;
  // Compras sin repetición y sin fecha cercana -> neutral, salvo vencidas
  if (dl < 0) return 'overdue';
  if (dl <= 1) return 'urgent';
  if (dl <= notify) return 'upcoming';
  if (loop.category === 'shopping' && loop.recurrence === 'none') return 'neutral';
  return 'ok';
}

function countdownText(loop) {
  const dl = daysUntil(loop.nextDate);
  if (dl < 0) return { num: Math.abs(dl), label: `día${Math.abs(dl)===1?'':'s'} vencido` };
  if (dl === 0) {
    // Cuenta regresiva real: horas y minutos hasta el fin del día
    const endOfDay = todayMid(); endOfDay.setDate(endOfDay.getDate() + 1);
    const ms = endOfDay.getTime() - Date.now();
    const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
    return { num: `${h}h ${m}m`, label: 'vence hoy', sm: true };
  }
  if (dl === 1) {
    // Tiempo real que falta hasta mañana (24–48 h)
    const ms = parseDate(loop.nextDate).getTime() - Date.now();
    const h = Math.floor((ms % 86400000) / 3600000);
    return { num: `1d ${h}h`, label: 'para mañana', sm: true };
  }
  return { num: dl, label: 'días restantes' };
}

/* Largo del ciclo en días (para la barra de progreso) */
function cycleDays(loop) {
  switch (loop.recurrence) {
    case 'weekly':  return 7;
    case 'monthly': return 30.44;
    case 'yearly':  return 365;
    default:        return Math.max((loop.notifyDaysBefore || 3) * 2, 14); // 'none'
  }
}

/* Partes de la cuenta regresiva REAL (tic a tic) + % de la barra */
function cdParts(loop) {
  const DAY = 86400000;
  const pad = (n) => String(n).padStart(2, '0');
  const deadline = parseDate(loop.nextDate).getTime() + DAY; // vence al final del día
  const rem = deadline - Date.now();

  if (rem <= 0) {
    const od = Math.abs(daysUntil(loop.nextDate));
    return { overdue: true, big: String(od), label: `día${od === 1 ? '' : 's'} vencido`, clock: '', pct: 100 };
  }
  const days = Math.floor(rem / DAY);
  const hh = Math.floor((rem % DAY) / 3600000);
  const mm = Math.floor((rem % 3600000) / 60000);
  const ss = Math.floor((rem % 60000) / 1000);
  const clock = `${pad(hh)}:${pad(mm)}:${pad(ss)}`;

  let big, label;
  if (days === 0) { big = 'Hoy'; label = 'vence hoy'; }
  else { big = `${days} d`; label = days === 1 ? 'para mañana' : 'días restantes'; }

  const remDays = rem / DAY;
  const pct = Math.max(4, Math.min(100, Math.round((1 - remDays / cycleDays(loop)) * 100)));
  return { overdue: false, big, label, clock, pct };
}

/* Avanzar al próximo ciclo según recurrencia */
function nextCycle(dateStr, recurrence) {
  const d = parseDate(dateStr);
  const today = todayMid();
  // Avanza al menos un periodo, y sigue hasta superar hoy
  do {
    if (recurrence === 'weekly') d.setDate(d.getDate() + 7);
    else if (recurrence === 'monthly') d.setMonth(d.getMonth() + 1);
    else if (recurrence === 'yearly') d.setFullYear(d.getFullYear() + 1);
    else return null; // 'none' -> no se repite
  } while (d <= today);
  return fmtDate(d);
}

/* ¿El loop ocurre en esta fecha? (considera la recurrencia) */
function occursOn(loop, date) {
  const anchor = parseDate(loop.nextDate);
  switch (loop.recurrence) {
    case 'weekly':  return date.getDay() === anchor.getDay();
    case 'monthly': return date.getDate() === anchor.getDate();
    case 'yearly':  return date.getMonth() === anchor.getMonth() && date.getDate() === anchor.getDate();
    default:        return fmtDate(date) === loop.nextDate; // 'none'
  }
}

/* Costo mensual normalizado (solo loops con monto) */
function monthlyCost(loop) {
  if (!loop.amount) return 0;
  return loop.amount * (RECURRENCE[loop.recurrence]?.perMonth || 0);
}
function money(n) { return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

/* ============================================================
   Acciones
   ============================================================ */
function markDone(id) {
  const loop = loops.find(l => l.id === id);
  if (!loop) return;
  const next = nextCycle(loop.nextDate, loop.recurrence);
  loop.history = loop.history || [];
  loop.history.push(loop.nextDate);
  if (next) {
    loop.nextDate = next;        // se reinicia al próximo ciclo
  } else {
    loops = loops.filter(l => l.id !== id);  // sin repetición -> se completa y archiva
  }
  save(); render();
}

function upsertLoop(data) {
  if (data.id) {
    const i = loops.findIndex(l => l.id === data.id);
    if (i >= 0) loops[i] = { ...loops[i], ...data };
  } else {
    loops.push({ ...data, id: uid(), history: [] });
  }
  save(); render();
}
function deleteLoop(id) { loops = loops.filter(l => l.id !== id); save(); render(); }

/* ============================================================
   Render principal
   ============================================================ */
function visibleLoops() {
  let list = loops.slice();
  if (activeFilter !== 'all') list = list.filter(l => l.category === activeFilter);
  if (searchQuery) list = list.filter(l => l.title.toLowerCase().includes(searchQuery));
  // Orden por urgencia y, dentro, por días restantes
  return list.sort((a, b) => {
    const sa = STATES[statusOf(a)].order, sb = STATES[statusOf(b)].order;
    if (sa !== sb) return sa - sb;
    return daysUntil(a.nextDate) - daysUntil(b.nextDate);
  });
}

function render() {
  renderGreeting();
  renderSummary();
  renderFilters();
  renderView();
}

function renderGreeting() {
  const h = new Date().getHours();
  const saludo = h < 6 ? 'Buenas noches' : h < 12 ? 'Buenos días' : h < 20 ? 'Buenas tardes' : 'Buenas noches';
  const overdue = loops.filter(l => statusOf(l) === 'overdue').length;
  const el = document.getElementById('greeting');
  el.textContent = overdue > 0
    ? `${saludo} — tienes ${overdue} pendiente${overdue>1?'s':''} vencido${overdue>1?'s':''}`
    : `${saludo} — todo bajo control`;
}

function renderSummary() {
  const bar = document.getElementById('summary-bar');
  const counts = { overdue: 0, urgent: 0, upcoming: 0, ok: 0 };
  loops.forEach(l => { const s = statusOf(l); if (counts[s] !== undefined) counts[s]++; });
  const totalMonthly = loops.reduce((sum, l) => sum + monthlyCost(l), 0);

  const pill = (state, n) => `
    <div class="summary-pill">
      <span class="dot" style="background:${STATES[state].color}"></span>
      ${n} <span class="sub">${STATES[state].label.toLowerCase()}</span>
    </div>`;

  bar.innerHTML = `
    <div class="summary-pill total">${money(totalMonthly)} <span style="opacity:.85;font-weight:500">/ mes</span></div>
    ${counts.overdue ? pill('overdue', counts.overdue) : ''}
    ${counts.urgent ? pill('urgent', counts.urgent) : ''}
    ${counts.upcoming ? pill('upcoming', counts.upcoming) : ''}
    ${pill('ok', counts.ok)}
  `;
}

function renderFilters() {
  const el = document.getElementById('filters');
  const chip = (key, iconName, label) =>
    `<button class="filter-chip ${activeFilter===key?'active':''}" data-filter="${key}">${svg(iconName)} ${label}</button>`;
  let html = chip('all', 'star', 'Todos');
  for (const [key, c] of Object.entries(CATEGORIES)) {
    const n = loops.filter(l => l.category === key).length;
    html += chip(key, c.icon, `${c.label}${n ? ` (${n})` : ''}`);
  }
  el.innerHTML = html;
  el.querySelectorAll('.filter-chip').forEach(b =>
    b.onclick = () => { activeFilter = b.dataset.filter; render(); });
}

function renderView() {
  const main = document.getElementById('main');
  document.querySelectorAll('#view-switch button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === activeView));

  // El buscador solo aplica a Tablero y Suscripciones
  document.getElementById('search').style.display = activeView === 'calendar' ? 'none' : '';

  if (activeView === 'board') return renderBoard(main);
  if (activeView === 'subs') return renderSubs(main);
  if (activeView === 'calendar') return renderCalendar(main);
}

/* ---------- Vista: Tablero ---------- */
function renderBoard(main) {
  const list = visibleLoops();
  if (!list.length) {
    if (searchQuery) {
      main.innerHTML = `<div class="empty"><div class="em">${svg('search')}</div>
        <h3>Sin resultados</h3><p>Ningún Loop coincide con "<strong>${escapeHtml(searchQuery)}</strong>".</p></div>`;
      return;
    }
    return renderEmpty(main);
  }

  main.innerHTML = `<div class="cards-grid">${list.map(cardHTML).join('')}</div>`;
  main.querySelectorAll('.loop-card').forEach(card => {
    const id = card.dataset.id;
    card.onclick = (e) => { if (!e.target.closest('.done-btn')) openForm(loops.find(l => l.id === id)); };
    const done = card.querySelector('.done-btn');
    if (done) done.onclick = () => markDone(id);
  });
}

function cardHTML(loop) {
  const st = statusOf(loop);
  const s = STATES[st];
  const cd = cdParts(loop);
  const cat = CATEGORIES[loop.category];
  const doneLabel = loop.amount ? 'Pagado' : 'Hecho';
  return `
    <div class="loop-card" data-id="${loop.id}" style="--state-color:${s.color}">
      <div class="card-head">
        <span class="card-icon">${renderIcon(loop.icon || cat.icon)}</span>
        <span class="state-badge">${svg(s.icon)} ${s.label}</span>
      </div>
      <div class="title">${escapeHtml(loop.title)}</div>
      <div class="countdown">
        <span class="count-num">${cd.big}</span>
        <span class="count-label">${cd.label}</span>
      </div>
      <div class="count-clock"${cd.clock ? '' : ' style="display:none"'}>${cd.clock}</div>
      <div class="countbar"><i style="width:${cd.pct}%"></i></div>
      <div class="meta">
        <span class="amount">${loop.amount ? money(loop.amount) : '<span style="color:var(--text-dim)">—</span>'}</span>
        <span class="cycle">${svg(cat.icon)} ${RECURRENCE[loop.recurrence].label}</span>
      </div>
      <button class="done-btn">${svg('check')} ${doneLabel}</button>
    </div>`;
}

/* Refresco en vivo (tic a tic) de cuentas regresivas y barras, sin re-renderizar */
function tickCountdowns() {
  document.querySelectorAll('#main .loop-card').forEach(card => {
    const loop = loops.find(l => l.id === card.dataset.id);
    if (!loop) return;
    const p = cdParts(loop);
    const num = card.querySelector('.count-num');
    const lab = card.querySelector('.count-label');
    const clk = card.querySelector('.count-clock');
    const bar = card.querySelector('.countbar > i');
    if (num) num.textContent = p.big;
    if (lab) lab.textContent = p.label;
    if (clk) { clk.textContent = p.clock; clk.style.display = p.clock ? '' : 'none'; }
    if (bar) bar.style.width = p.pct + '%';
    card.style.setProperty('--state-color', STATES[statusOf(loop)].color);
  });
}

/* ---------- Vista: Suscripciones (tracking) ---------- */
function renderSubs(main) {
  const subs = loops.filter(l => l.category === 'subs');
  const monthly = subs.reduce((s, l) => s + monthlyCost(l), 0);
  const yearly = monthly * 12;

  if (!subs.length) {
    main.innerHTML = `<div class="empty"><div class="em">${svg('credit-card')}</div>
      <h3>Sin suscripciones aún</h3>
      <p>Agrega Netflix, Spotify, tu nube… y mira cuánto gastas al mes.</p></div>`;
    return;
  }

  const shown = searchQuery ? subs.filter(l => l.title.toLowerCase().includes(searchQuery)) : subs;
  const rows = shown
    .sort((a, b) => daysUntil(a.nextDate) - daysUntil(b.nextDate))
    .map(l => {
      const s = STATES[statusOf(l)];
      const dl = daysUntil(l.nextDate);
      const when = dl < 0 ? `vencido hace ${Math.abs(dl)}d` : dl === 0 ? 'vence hoy' : dl === 1 ? 'mañana' : `en ${dl} días`;
      return `
        <div class="sub-row" data-id="${l.id}" style="--state-color:${s.color}">
          <span class="ic">${renderIcon(l.icon || 'credit-card')}</span>
          <div class="info">
            <div class="n">${escapeHtml(l.title)}</div>
            <div class="d">${RECURRENCE[l.recurrence].label} · ${money(monthlyCost(l))}/mes</div>
          </div>
          <div class="right">
            <div class="a">${l.amount ? money(l.amount) : '—'}</div>
            <div class="c">${svg(s.icon)} ${when}</div>
          </div>
        </div>`;
    }).join('');

  main.innerHTML = `
    <div class="subs-hero">
      <div class="big">${money(monthly)}</div>
      <div class="label">en suscripciones al mes</div>
      <div class="split">
        <div><span class="n">${subs.length}</span><span class="t">activas</span></div>
        <div><span class="n">${money(yearly)}</span><span class="t">al año</span></div>
      </div>
    </div>
    <div class="subs-list">${rows}</div>`;

  main.querySelectorAll('.sub-row').forEach(r =>
    r.onclick = () => openForm(loops.find(l => l.id === r.dataset.id)));
}

/* ---------- Vista: Calendario ---------- */
let calOffset = 0;
function renderCalendar(main) {
  const base = new Date(); base.setDate(1); base.setMonth(base.getMonth() + calOffset);
  const year = base.getFullYear(), month = base.getMonth();
  const monthName = base.toLocaleDateString('es', { month: 'long', year: 'numeric' });
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // lunes=0
  const days = new Date(year, month + 1, 0).getDate();
  const todayStr = fmtDate(todayMid());

  let cells = '';
  const dows = ['L','M','X','J','V','S','D'];
  dows.forEach(d => cells += `<div class="cal-dow">${d}</div>`);
  for (let i = 0; i < firstDow; i++) cells += `<div class="cal-cell empty"></div>`;
  for (let day = 1; day <= days; day++) {
    const date = new Date(year, month, day);
    const ds = fmtDate(date);
    // Considera la recurrencia: muestra cada Loop en todas sus fechas del mes
    const items = loops.filter(l => occursOn(l, date));
    const dots = items.slice(0, 5).map(l =>
      `<span class="d" style="background:${STATES[statusOf(l)].color}" title="${escapeHtml(l.title)}"></span>`).join('');
    cells += `<div class="cal-cell ${ds===todayStr?'today':''}">
      <span class="day-num">${day}</span><div class="cal-dots">${dots}</div></div>`;
  }

  main.innerHTML = `
    <div class="cal-head">
      <button class="icon-btn" id="cal-prev" aria-label="Mes anterior">${svg('chevron-left')}</button>
      <h3 style="text-transform:capitalize">${monthName}</h3>
      <button class="icon-btn" id="cal-next" aria-label="Mes siguiente">${svg('chevron-right')}</button>
    </div>
    <div class="cal-grid">${cells}</div>`;
  main.querySelector('#cal-prev').onclick = () => { calOffset--; renderCalendar(main); };
  main.querySelector('#cal-next').onclick = () => { calOffset++; renderCalendar(main); };
}

function renderEmpty(main) {
  main.innerHTML = `<div class="empty"><div class="em">${svg('repeat')}</div>
    <h3>Nada por aquí todavía</h3>
    <p>Toca el botón <strong>+</strong> para agregar tu primer Loop:<br>
    una suscripción, un pago, una rutina o un recado.</p></div>`;
}

/* ============================================================
   Formulario (modal)
   ============================================================ */
function openForm(loop) {
  const isEdit = !!loop;
  const data = loop || { title: '', category: 'subs', icon: 'credit-card', amount: '', currency: 'USD',
                         recurrence: 'monthly', nextDate: offsetDate(7), notifyDaysBefore: 3, notes: '' };

  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal');

  modal.innerHTML = `
    <h2>${isEdit ? 'Editar Loop' : 'Nuevo Loop'}</h2>
    <p class="modal-sub">Todo lo que se repite: una fecha, un color, una cuenta regresiva.</p>

    <div class="field">
      <label>Categoría</label>
      <div class="cat-picker" id="cat-picker">
        ${Object.entries(CATEGORIES).map(([k,c]) =>
          `<button data-cat="${k}" class="${data.category===k?'sel':''}">${svg(c.icon)} ${c.label}</button>`).join('')}
      </div>
    </div>

    <div class="field">
      <label>Nombre</label>
      <input id="f-title" placeholder="Ej. Netflix, Alquiler, Regar plantas" value="${escapeAttr(data.title)}" />
    </div>

    <div class="field">
      <label>Icono</label>
      <div class="icon-picker" id="icon-picker">
        ${ICONS.map(i => `<button data-icon="${i}" class="${data.icon===i?'sel':''}" title="${i}">${svg(i)}</button>`).join('')}
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Monto (opcional)</label>
        <input id="f-amount" type="number" step="0.01" min="0" placeholder="0.00" value="${data.amount ?? ''}" />
      </div>
      <div class="field">
        <label>Repetición</label>
        <select id="f-recurrence">
          ${Object.entries(RECURRENCE).map(([k,r]) =>
            `<option value="${k}" ${data.recurrence===k?'selected':''}>${r.label}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Próxima fecha</label>
        <input id="f-date" type="date" value="${data.nextDate}" />
      </div>
      <div class="field">
        <label>Avisar (días antes)</label>
        <input id="f-notify" type="number" min="0" max="60" value="${data.notifyDaysBefore ?? 3}" />
      </div>
    </div>

    <div class="modal-actions">
      ${isEdit ? `<button class="btn btn-danger" id="f-delete">Eliminar</button>` : ''}
      <button class="btn btn-ghost" id="f-cancel">Cancelar</button>
      <button class="btn btn-primary" id="f-save">${isEdit ? 'Guardar' : 'Agregar'}</button>
    </div>
  `;

  overlay.hidden = false;
  let sel = { category: data.category, icon: data.icon };

  modal.querySelectorAll('#cat-picker button').forEach(b => b.onclick = () => {
    sel.category = b.dataset.cat;
    modal.querySelectorAll('#cat-picker button').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  });
  modal.querySelectorAll('#icon-picker button').forEach(b => b.onclick = () => {
    sel.icon = b.dataset.icon;
    modal.querySelectorAll('#icon-picker button').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  });

  const close = () => { overlay.hidden = true; };
  modal.querySelector('#f-cancel').onclick = close;
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
  if (isEdit) modal.querySelector('#f-delete').onclick = () => {
    if (confirm(`¿Eliminar "${data.title}"?`)) { deleteLoop(data.id); close(); }
  };

  modal.querySelector('#f-save').onclick = () => {
    const title = modal.querySelector('#f-title').value.trim();
    if (!title) { modal.querySelector('#f-title').focus(); return; }
    const amountRaw = modal.querySelector('#f-amount').value;
    upsertLoop({
      id: isEdit ? data.id : undefined,
      title,
      category: sel.category,
      icon: sel.icon,
      amount: amountRaw === '' ? null : parseFloat(amountRaw),
      currency: 'USD',
      recurrence: modal.querySelector('#f-recurrence').value,
      nextDate: modal.querySelector('#f-date').value,
      notifyDaysBefore: parseInt(modal.querySelector('#f-notify').value, 10) || 0,
    });
    close();
  };
}

/* ============================================================

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c =>
  ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }

/* ============================================================
   Copia de seguridad (exportar / importar) — todo local
   ============================================================ */
function exportData() {
  const blob = new Blob([JSON.stringify(loops, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `loopapp-backup-${fmtDate(todayMid())}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}
document.getElementById('export-data').onclick = () => { closeMenu(); exportData(); };

const importFile = document.getElementById('import-file');
document.getElementById('import-data').onclick = () => { closeMenu(); importFile.click(); };
importFile.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const raw = JSON.parse(r.result);
      if (!Array.isArray(raw)) throw new Error('formato');
      if (!confirm(`Importar ${raw.length} Loop${raw.length === 1 ? '' : 's'}? Esto reemplazará los actuales.`)) return;
      // Normaliza cada registro para evitar datos corruptos
      loops = raw.map(l => ({
        id: l.id || uid(),
        title: String(l.title || 'Sin nombre'),
        category: CATEGORIES[l.category] ? l.category : 'routine',
        icon: l.icon || 'repeat',
        amount: (l.amount === 0 || l.amount) ? Number(l.amount) : null,
        currency: l.currency || 'USD',
        recurrence: RECURRENCE[l.recurrence] ? l.recurrence : 'none',
        nextDate: /^\d{4}-\d{2}-\d{2}$/.test(l.nextDate) ? l.nextDate : offsetDate(7),
        notifyDaysBefore: Number.isFinite(+l.notifyDaysBefore) ? +l.notifyDaysBefore : 3,
        notes: l.notes || '',
        history: Array.isArray(l.history) ? l.history : [],
      }));
      save(); render();
    } catch (err) {
      alert('Archivo no válido. Debe ser un respaldo .json exportado desde Loopapp.');
    } finally {
      importFile.value = '';
    }
  };
  r.readAsText(file);
};

/* ============================================================
   Avisos: push real (app cerrada) + notificación local (app abierta)
   ============================================================ */
const NOTIFY_SENT_KEY = 'loopapp.notify.sent.v1';
const PUSH_ENABLED_KEY = 'loopapp.push.enabled';
const DEVICE_KEY = 'loopapp.device.id';
const SB = window.LOOPAPP_SUPABASE || {};
const VAPID_PUBLIC = (window.LOOPAPP_PUSH && window.LOOPAPP_PUSH.vapidPublic) || '';

function notifyEnabled() { return 'Notification' in window && Notification.permission === 'granted'; }
function pushEnabled() { return localStorage.getItem(PUSH_ENABLED_KEY) === '1'; }
function deviceId() {
  let id = localStorage.getItem(DEVICE_KEY);
  if (!id) { id = 'dev_' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2); localStorage.setItem(DEVICE_KEY, id); }
  return id;
}
function urlBase64ToUint8Array(s) {
  const pad = '='.repeat((4 - s.length % 4) % 4);
  const b64 = (s + pad).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b64); const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}
function sbHeaders() { return { 'Content-Type': 'application/json', apikey: SB.anonKey, Authorization: `Bearer ${SB.anonKey}` }; }

/* Sincroniza lo mínimo de cada Loop a la nube (solo si el push está activo) */
let syncTimer;
function scheduleSync() {
  if (!pushEnabled()) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(syncReminders, 1500);
}
async function syncReminders() {
  if (!pushEnabled() || !SB.url) return;
  const reminders = loops.map(l => ({
    loop_id: l.id, title: l.title, next_date: l.nextDate, notify_days: l.notifyDaysBefore ?? 3,
  }));
  try {
    await fetch(`${SB.url}/functions/v1/push-sync`, {
      method: 'POST', headers: sbHeaders(),
      body: JSON.stringify({ device_id: deviceId(), reminders }),
    });
  } catch (e) { /* reintentará en el próximo cambio */ }
}

async function setupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) {
    alert('Tu navegador no soporta notificaciones push.'); return;
  }
  if (!VAPID_PUBLIC || !SB.url) { alert('Falta configurar el push en el servidor.'); return; }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { alert('No se activaron los avisos. Habilítalos en los permisos del navegador.'); return; }
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC),
      });
    }
    const res = await fetch(`${SB.url}/functions/v1/push-subscribe`, {
      method: 'POST', headers: sbHeaders(),
      body: JSON.stringify({ device_id: deviceId(), subscription: sub }),
    });
    if (!res.ok) throw new Error(await res.text());
    localStorage.setItem(PUSH_ENABLED_KEY, '1');
    await syncReminders();
    checkDue();
    alert('Avisos activados 🔔\nTe llegarán aunque cierres la app (cuando algo esté por vencer).');
  } catch (e) {
    alert('No se pudieron activar los avisos push. Inténtalo de nuevo.');
  }
}

document.getElementById('enable-notify').onclick = () => { closeMenu(); setupPush(); };

function checkDue() {
  if (!notifyEnabled()) return;
  let sent = {};
  try { sent = JSON.parse(localStorage.getItem(NOTIFY_SENT_KEY)) || {}; } catch (e) {}
  const today = fmtDate(todayMid());
  loops.forEach(l => {
    const st = statusOf(l);
    if (st === 'overdue' || st === 'urgent' || st === 'upcoming') {
      const key = `${l.id}@${today}`;
      if (!sent[key]) {
        const body = st === 'overdue'
          ? '¡Vencido! Tócalo para revisarlo.'
          : `Próximo a vencer (${l.nextDate}).`;
        try { new Notification(`Loopapp · ${l.title}`, { body, icon: 'icon.svg', tag: l.id }); } catch (e) {}
        sent[key] = true;
      }
    }
  });
  localStorage.setItem(NOTIFY_SENT_KEY, JSON.stringify(sent));
}

   Arranque + refresco en vivo de cuentas regresivas / avisos
   ============================================================ */

setInterval(() => {

  checkDue();
}, 60000);
