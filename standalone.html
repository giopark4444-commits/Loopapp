  } catch(e) { return []; }
}
async function addShare(clientId, email, perm) {
  const s = await ensureSession(); if (!s) return { error: 'Inicia sesión.' };
  let uuid = await serverLoopUuid(clientId);
  if (!uuid) { await serverSaveLoop(loops.find(l => l.id === clientId)); uuid = await serverLoopUuid(clientId); }
  if (!uuid) return { error: 'El loop aún se está sincronizando. Intenta de nuevo en unos segundos.' };
  try {
    const r = await fetch(`${SB.url}/rest/v1/loop_shares`, {
      method: 'POST', headers: { ...sbHeaders(), Prefer: 'return=minimal' },
      body: JSON.stringify([{ loop_id: uuid, invited_email: email.toLowerCase(), permission: perm, created_by: s.user.id }])
    });
    if (!r.ok) { const t = await r.text(); if (t.includes('duplicate') || t.includes('unique')) return { error: 'Ya compartiste este loop con ese correo.' }; return { error: 'No se pudo compartir.' }; }
    return { ok: true };
  } catch(e) { return { error: 'Error de conexión.' }; }
}
async function removeShare(shareId) {
  try { await fetch(`${SB.url}/rest/v1/loop_shares?id=eq.${shareId}`, { method: 'DELETE', headers: sbHeaders() }); } catch(e) {}
}
async function fetchShared() {
  const s = await ensureSession(); if (!s || !SB.url) { sharedLoops = []; return; }
  try {
    const r = await fetch(`${SB.url}/rest/v1/loop_shares?grantee_id=eq.${s.user.id}&select=permission,loops(id,client_id,data,owner_id)`, { headers: sbHeaders() });
    if (!r.ok) { sharedLoops = []; return; }
    const rows = await r.json();
    sharedLoops = rows.filter(x => x.loops && x.loops.data).map(x => ({ ...x.loops.data, id: x.loops.client_id, _shared: true, _perm: x.permission, _owner: x.loops.owner_id, _uuid: x.loops.id }));
  } catch(e) { sharedLoops = []; }
}

/* -- Modal de colaboradores (compartir un loop) -- */
function openShareModal(clientId) {
  const ov = document.getElementById('modal-overlay'), m = document.getElementById('modal');
  m.innerHTML = `
    <h2>Dar acceso</h2>
    <p class="modal-sub">Comparte este loop por correo. La persona solo verá <strong>este</strong> loop — nada más de lo tuyo.</p>
    <div class="field"><label>Correo</label><input id="sh-email" type="email" placeholder="persona@correo.com" autocomplete="off" /></div>
    <div class="field"><label>Permiso</label><select id="sh-perm">
      <option value="view">Solo ver</option>
      <option value="edit">Ver y editar</option>
    </select></div>
    <div id="sh-err" class="auth-err" hidden></div>
    <button class="btn btn-primary" id="sh-add" style="width:100%;margin-bottom:14px">Compartir</button>
    <div id="sh-list"><p class="sub" style="text-align:center">Cargando…</p></div>
    <div class="modal-actions"><button class="btn btn-ghost" id="sh-close">Cerrar</button></div>`;
  ov.hidden = false;
  const errEl = m.querySelector('#sh-err');
  async function refresh() {
    const shares = await listShares(clientId);
    const el = m.querySelector('#sh-list');
    if (!el) return;
    if (!shares.length) { el.innerHTML = `<p class="sub" style="text-align:center">Aún no lo has compartido con nadie.</p>`; return; }
    el.innerHTML = `<div class="sh-rows">${shares.map(s => `
      <div class="sh-row">
        <div class="sh-info"><div class="sh-mail">${escapeHtml(s.invited_email || '—')}</div>
          <div class="sh-meta">${s.permission === 'edit' ? 'Ver y editar' : 'Solo ver'} · ${s.grantee_id ? 'activo' : 'invitación pendiente'}</div></div>
        <button class="sh-del" data-sid="${s.id}" aria-label="Quitar">${svg('trash')}</button>
      </div>`).join('')}</div>`;
    el.querySelectorAll('.sh-del').forEach(b => b.onclick = async () => { b.disabled = true; await removeShare(b.dataset.sid); refresh(); });
  }
  refresh();
  m.querySelector('#sh-add').onclick = async () => {
    const email = m.querySelector('#sh-email').value.trim();
    const perm = m.querySelector('#sh-perm').value;
    const btn = m.querySelector('#sh-add');
    errEl.hidden = true;
    if (!email || !email.includes('@')) { errEl.textContent = 'Escribe un correo válido.'; errEl.hidden = false; return; }
    btn.disabled = true; btn.textContent = '…';
    const res = await addShare(clientId, email, perm);
    btn.disabled = false; btn.textContent = 'Compartir';
    if (res.error) { errEl.textContent = res.error; errEl.hidden = false; return; }
    m.querySelector('#sh-email').value = '';
    refresh();
  };
  m.querySelector('#sh-close').onclick = () => { ov.hidden = true; };
  ov.onclick = (e) => { if (e.target === ov) ov.hidden = true; };
}

/* -- Vista "Compartidos conmigo" -- */
async function renderCompartidos(v) {
  v.innerHTML = `<div class="sec-title">Compartidos conmigo</div><div class="list" id="shared-list"><p class="sub" style="text-align:center;padding:20px">Cargando…</p></div>`;
  await fetchShared();
  const el = document.getElementById('shared-list'); if (!el) return;
  if (!sharedLoops.length) {
    el.innerHTML = `<div class="empty"><div class="em">${svg('forward')}</div><h3>Nada compartido aún</h3><p>Cuando alguien comparta un loop contigo, aparecerá aquí.</p></div>`;
    return;
  }
  el.innerHTML = sharedLoops.map(l => {
    const st = STATES[statusOf(l)], cd = cdParts(l), cat = catOf(l);
    const badge = l._perm === 'edit' ? '<span class="tag auto">Puedes editar</span>' : '<span class="tag task">Solo ver</span>';
    const canCheck = l._perm === 'edit' && recurOf(l);
    return `<div class="row" data-cid="${l.id}" style="--st:${st.color}">
      <div class="row-top">
        <span class="ic">${renderIcon(l.icon || cat.icon)}</span>
        <div class="mid"><div class="t">${escapeHtml(l.title)}</div>
          <div class="m">${badge} ${recurLabel(l)}${l.amount ? ' · ' + amtLabel(l) : ''}</div>
          ${l.notes ? `<div class="note">${escapeHtml(l.notes)}</div>` : ''}</div>
        <div class="right"><div class="cd">${cd.big}</div><div class="cl">${cd.cl}</div></div>
        ${canCheck ? `<button class="chk" data-cid="${l.id}" title="Marcar ${l.amount ? 'pagado' : 'hecho'}">${svg('check')}</button>` : ''}
      </div>
      <div class="rowbar"><i style="width:${cd.pct}%"></i></div>
    </div>`;
  }).join('');
  el.querySelectorAll('.chk[data-cid]').forEach(b => b.onclick = (e) => { e.stopPropagation(); markDoneShared(b.dataset.cid); });
}
async function markDoneShared(cid) {
  const loop = sharedLoops.find(l => l.id === cid); if (!loop || !SB.url) return;
  const s = await ensureSession(); if (!s) return;
  const next = nextCycle(loop);
  const upd = { ...loop }; const uuid = upd._uuid;
  delete upd._shared; delete upd._perm; delete upd._owner; delete upd._uuid;
  upd.history = (upd.history || []).concat([upd.nextDate]);
  if (next) upd.nextDate = next;
  try {
    await fetch(`${SB.url}/rest/v1/loops?id=eq.${uuid}`, {
      method: 'PATCH', headers: { ...sbHeaders(), Prefer: 'return=minimal' },
      body: JSON.stringify({ next_date: upd.nextDate, data: upd })
    });
  } catch(e) {}
  const v = document.getElementById('view'); if (v && activeSection === 'compartidos') renderCompartidos(v);
}

/* ============================================================
   Avisos: push real (app cerrada) + notificación local
   ============================================================ */
const NOTIFY_SENT_KEY = 'loopapp.notify.sent.v1', PUSH_ENABLED_KEY = 'loopapp.push.enabled', DEVICE_KEY = 'loopapp.device.id';
const VAPID_PUBLIC = (window.LOOPAPP_PUSH && window.LOOPAPP_PUSH.vapidPublic) || '';
function notifyEnabled() { return 'Notification' in window && Notification.permission === 'granted'; }
function pushEnabled() { return localStorage.getItem(PUSH_ENABLED_KEY) === '1'; }
function deviceId() { let id = localStorage.getItem(DEVICE_KEY); if (!id) { id = 'dev_' + Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2); localStorage.setItem(DEVICE_KEY, id); } return id; }
function urlB64(s) { const pad = '='.repeat((4 - s.length % 4) % 4); const b = (s+pad).replace(/-/g,'+').replace(/_/g,'/'); const raw = atob(b); const a = new Uint8Array(raw.length); for (let i=0;i<raw.length;i++) a[i]=raw.charCodeAt(i); return a; }
let syncTimer;
function scheduleSync() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => { syncReminders(); syncCal(); if (getSession()) syncUp(); }, 1500);
}
async function syncReminders() {
  if (!pushEnabled() || !SB.url) return;
  const reminders = loops.map(l => ({ loop_id: l.id, title: l.title, next_date: l.nextDate, notify_days: l.notifyDaysBefore ?? 3 }));
  try { await fetch(`${SB.url}/functions/v1/push-sync`, { method:'POST', headers: sbHeaders(), body: JSON.stringify({ device_id: deviceId(), reminders }) }); } catch (e) {}
}

/* ---------- Suscripción de calendario (webcal) ---------- */
const CAL_ENABLED_KEY = 'loopapp.cal.enabled';
function calEnabled() { return localStorage.getItem(CAL_ENABLED_KEY) === '1'; }
function webcalUrl() { return SB.url.replace(/^https?:/, 'webcal:') + '/functions/v1/calendar?device=' + deviceId() + '&apikey=' + encodeURIComponent(SB.anonKey || ''); }
function calLoopsPayload() {
  return loops.map(l => ({ loop_id: l.id, title: l.title, next_date: l.nextDate, recur: recurOf(l), notify_days: l.notifyDaysBefore ?? 3, category: catOf(l).label, amount: l.amount, currency: l.currency || pref('currency','USD') }));
}
async function syncCal() {
  if (!calEnabled() || !SB.url) return;
  try { await fetch(`${SB.url}/functions/v1/cal-sync`, { method:'POST', headers: sbHeaders(), body: JSON.stringify({ device_id: deviceId(), loops: calLoopsPayload() }) }); } catch (e) {}
}
async function enableCal() {
  if (!SB.url) { alert('Falta configurar el servidor.'); return; }
  localStorage.setItem(CAL_ENABLED_KEY, '1');
  try {
    const res = await fetch(`${SB.url}/functions/v1/cal-sync`, { method:'POST', headers: sbHeaders(), body: JSON.stringify({ device_id: deviceId(), loops: calLoopsPayload() }) });
    if (!res.ok) throw new Error();
    render();
  } catch (e) { localStorage.removeItem(CAL_ENABLED_KEY); alert('No se pudo activar la suscripción. Revisa tu conexión.'); }
}
async function disableCal() {
  localStorage.removeItem(CAL_ENABLED_KEY);
  try { await fetch(`${SB.url}/functions/v1/cal-sync`, { method:'POST', headers: sbHeaders(), body: JSON.stringify({ device_id: deviceId(), loops: [] }) }); } catch (e) {}
  render();
}
async function setupPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) { alert('Tu navegador no soporta notificaciones push.'); return; }
  if (!VAPID_PUBLIC || !SB.url) { alert('Falta configurar el push en el servidor.'); return; }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { alert('No se activaron los avisos.'); return; }
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlB64(VAPID_PUBLIC) });
    const res = await fetch(`${SB.url}/functions/v1/push-subscribe`, { method:'POST', headers: sbHeaders(), body: JSON.stringify({ device_id: deviceId(), subscription: sub }) });
    if (!res.ok) throw new Error(await res.text());
    localStorage.setItem(PUSH_ENABLED_KEY, '1'); await syncReminders(); checkDue();
    alert('Avisos activados 🔔\nTe llegarán aunque cierres la app.');
  } catch (e) { alert('No se pudieron activar los avisos push.'); }
}
function checkDue() {
  if (!notifyEnabled()) return;
  let sent = {}; try { sent = JSON.parse(localStorage.getItem(NOTIFY_SENT_KEY)) || {}; } catch (e) {}
  const today = fmtDate(todayMid());
  loops.forEach(l => {
    const st = statusOf(l);
    if (['overdue','urgent','upcoming'].includes(st)) {
      const key = `${l.id}@${today}`;
      if (!sent[key]) { try { new Notification(`Loopkeeper · ${l.title}`, { body: st==='overdue'?'¡Vencido!':'Próximo a vencer.', icon: 'icon.svg', tag: l.id }); } catch(e){} sent[key] = true; }
    }
  });
  localStorage.setItem(NOTIFY_SENT_KEY, JSON.stringify(sent));
}

/* Instalar PWA */
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });

/* Service worker */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
  // Cuando una versión nueva toma el control, recarga una vez para mostrar lo último
  // (evita el clásico "no se ven los cambios" hasta recargar dos veces).
  let swReloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (swReloaded) return;
    swReloaded = true;
    location.reload();
  });
}

/* ---------- Pantalla de auth ---------- */
function showAuthScreen(tab) {
  const scr = document.getElementById('auth-screen');
  if (!scr) return;
  scr.hidden = false;
  renderAuthScreen(tab || 'signin');
}
function hideAuthScreen() {
  const scr = document.getElementById('auth-screen'); if (scr) scr.hidden = true;
}
function renderAuthScreen(tab) {
  const scr = document.getElementById('auth-screen'); if (!scr) return;
  scr.innerHTML = `
    <div class="auth-box">
      <div class="auth-logo">${svg('repeat')}<span>Loopkeeper</span></div>
      <div class="auth-tabs">
        <button id="tab-signin" class="${tab==='signin'?'act':''}">Entrar</button>
        <button id="tab-signup" class="${tab==='signup'?'act':''}">Crear cuenta</button>
      </div>
      <div id="auth-form">
        <input type="email" id="auth-email" placeholder="tu@correo.com" autocomplete="email" inputmode="email" />
        <input type="password" id="auth-pwd" placeholder="${tab==='signup'?'Contraseña (mín. 6 caracteres)':'Contraseña'}" autocomplete="${tab==='signup'?'new-password':'current-password'}" />
        <div id="auth-err" class="auth-err" hidden></div>
        <button id="auth-submit" class="auth-btn">${tab==='signin'?'Entrar':'Crear cuenta'}</button>
      </div>
    </div>`;
  const errEl = scr.querySelector('#auth-err');
  function showErr(msg) { errEl.textContent = msg; errEl.hidden = false; }
  scr.querySelector('#tab-signin').onclick = () => renderAuthScreen('signin');
  scr.querySelector('#tab-signup').onclick = () => renderAuthScreen('signup');
  scr.querySelector('#auth-submit').onclick = async () => {
    const email = scr.querySelector('#auth-email').value.trim();
    const pwd = scr.querySelector('#auth-pwd').value;
    const btn = scr.querySelector('#auth-submit');
    if (!email || !pwd) { showErr('Completa todos los campos.'); return; }
    btn.disabled = true; btn.textContent = '…'; errEl.hidden = true;
    try {
      if (tab === 'signin') { await signIn(email, pwd); }
      else { await signUp(email, pwd); }
      await onAuthSuccess();
    } catch(e) {
      btn.disabled = false; btn.textContent = tab === 'signin' ? 'Entrar' : 'Crear cuenta';
      if (e.message === 'confirm_email') showErr('Revisa tu correo y haz clic en el enlace de confirmación.');
      else showErr(e.message || 'Error al iniciar sesión.');
    }
  };
  scr.querySelector('#auth-email').addEventListener('keydown', e => { if (e.key==='Enter') scr.querySelector('#auth-pwd').focus(); });
  scr.querySelector('#auth-pwd').addEventListener('keydown', e => { if (e.key==='Enter') scr.querySelector('#auth-submit').click(); });
}
async function onAuthSuccess() {
  hideAuthScreen();
  await loadPlan();
  await syncDown();
  render();
  checkDue();
}

/* ---------- Arranque ---------- */
async function boot() {
  applyTheme(pref('theme', (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'noche' : 'marfil'));
  applyLayout(pref('layout', 'list'));
  document.querySelectorAll('[data-ico]').forEach(el => el.insertAdjacentHTML('afterbegin', svg(el.dataset.ico)));
  const s = await ensureSession();
  if (!s) { showAuthScreen(); return; }
  await loadPlan();
  await syncDown();
  render();
  checkDue();
  setInterval(() => { if ((activeSection === 'inicio' || activeSection === 'loops') && document.getElementById('modal-overlay').hidden) tickCountdowns(); }, 1000);
  setInterval(() => { checkDue(); }, 60000);
}
boot();
