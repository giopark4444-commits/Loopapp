    <text x="332" y="435" font-family="'Georgia', serif" font-size="12.5" font-weight="700" fill="#f5efe2" text-anchor="middle">$14</text>
  
    

    <rect x="22" y="474" width="356" height="54" rx="16" fill="#fbf7ee" stroke="#ddd0b4" stroke-width="1"/>
