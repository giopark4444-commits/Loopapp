<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f4ef" />
  <title>Loopapp — Todo lo que se repite, a la vista</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="hd">
      <button class="burger" id="menu-toggle" aria-label="Menú" data-ico="menu"></button>
      <div class="brand">
        <h1>Loopapp</h1>
        <p id="greeting">Todo lo que se repite, a la vista</p>
      </div>
      <button class="newbtn" id="add-btn"><span data-ico="plus"></span> Nuevo</button>
    </header>

    <main id="view"></main>
  </div>

  <!-- Menú lateral -->
  <div class="scrim" id="scrim" hidden></div>
  <nav class="drawer" id="drawer" aria-label="Navegación">
    <div class="dhead"><span class="lg" data-ico="repeat"></span><h2>Loopapp</h2></div>
    <div class="nav" id="nav"></div>
  </nav>

  <!-- Modal de formulario -->
  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <!-- Input oculto para importar respaldo -->
  <input id="import-file" type="file" accept="application/json,.json" hidden />

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
